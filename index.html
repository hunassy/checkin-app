<body>

<div class="container">

<h2>セルフケアチェックイン</h2>

<a href="settings.html">初期設定</a>

<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">

<p>天気情報</p>

<div class="weather loading" id="weatherResult">
天気を取得中...
</div>

</div>

<div class="section">

<p>睡眠について</p>

<p>睡眠タイプ</p>
<div class="score-buttons" id="sleepType"></div>

<p>総睡眠時間</p>
<input type="number" id="sleepHours" placeholder="時間" min="0" max="24">

</div>

<div class="section">

<p>今日の状況</p>
<div id="attendanceType"></div>

</div>

<div class="section">

  <p>Goodサイン</p>
  <div id="goodList"></div>

</div>

<div class="section">

  <p>Badサイン</p>
  <div id="badList"></div>
</div>

<div class="section">

<p>コメント</p>

<textarea id="comment"></textarea>

</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<script src="js/utils.js"></script>
