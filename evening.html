本日の日付：読み込み中...

</div>
<div class="weather-item">
<div class="weather-item-label">気温</div>
<div class="weather-item-value" id="tempValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧</div>
<div class="weather-item-value" id="pressureValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧注意度</div>

</div>
</div>

<!-- 朝との比較バナー -->
<div class="morning-compare-banner" id="morningCompareBanner" style="display:none;"></div>

<!-- 在宅・通所 -->
<div class="attendance-breakfast">
<div>
<label>今日の通所/在宅</label>
<select class="attendance-dropdown" id="attendance">
<option value="">選択してください</option>
<option value="通所">通所</option>
<option value="在宅">在宅</option>
<option value="休み">休み</option>
</select>
</div>
</div>

<!-- 体調・活力・メンタル（夜） -->
<div class="score-section">
  <div class="score-section-title">今日1日の体調</div>
  <div class="score-emoji-buttons" id="condition"></div>
</div>

<div class="score-section">
  <div class="score-section-title">今日1日の活力</div>
  <div class="score-emoji-buttons" id="energy"></div>
</div>

<div class="score-section">
  <div class="score-section-title">今日1日のメンタル</div>
  <div class="score-emoji-buttons" id="mental"></div>
</div>

<!-- 影響要因 -->
<div class="section">
<p class="section-label">今日の影響要因（当てはまるものを選択）</p>
<div class="factor-list" id="factorList"></div>
</div>

<!-- コメント -->
<div class="section">
<p class="section-label">今日の振り返り（自由記述）</p>
<textarea id="comment" placeholder="今日どんな一日でしたか？気になったこと、感じたことを自由に書いてください。"></textarea>
</div>

</div>

<!-- ボトムナビゲーション -->
<nav class="bottom-nav">

    <span class="nav-icon">📝</span>
    <span class="nav-label">記録</span>
    <span class="nav-dot"></span>
  </a>
  <a href="analysis.html" class="nav-item">
    <span class="nav-icon">📈</span>
    <span class="nav-label">分析</span>
  </a>
  <a href="settings.html" class="nav-item">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">設定</span>
  </a>
</nav>

<script>const PAGE_TYPE = 'evening';</script>
<script src="js/utils.js"></script>
<script src="js/score-ui.js"></script>
<script src="js/factors.js"></script>
<script src="js/main_weather.js"></script>
<script src="js/evening.js"></script>
<script src="js/record-router.js"></script>

<script>
// ============================================
// evening.js — 夜の振り返りページのロジック
// ============================================

// ★★★ 修正点 ★★★
// このページの記録対象となる日付をグローバルに保持する
let pageTargetDate = "";

// ============================================
// URLパラメータから記録対象の日付を取得する
// ============================================
function getTargetDateFromURL() {
  const params = new URLSearchParams(window.location.search);
  const dateParam = params.get("date");
  if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
    return dateParam;
  }
  return null;
}

// ============================================
// ページ読み込み時の初期化
// ============================================
window.onload = function() {
  // ★★★ 修正点 ★★★
  // 1. URLパラメータから日付を取得
  // 2. なければ論理日付を取得
  // 3. グローバル変数 pageTargetDate に保存
  pageTargetDate = getTargetDateFromURL();
  if (!pageTargetDate) {
    if (typeof getLogicalDate === "function") {
      pageTargetDate = getLogicalDate();
    } else {
      // フォールバック
      const now = new Date();
      pageTargetDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
    }
  }

  // 日付表示
  const dateParts = pageTargetDate.split("-");
  const targetDateObj = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
  const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
  const el = document.getElementById("dateSection");

  const now = new Date();
  const actualToday = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

  if (pageTargetDate !== actualToday) {
    // 前日分の記録であることを明示
    el.textContent = "📅 " + targetDateObj.toLocaleDateString('ja-JP', options) + " の振り返り";
    el.style.background = "#fff8e1";
    el.style.border = "1px solid #f57f1744";
  } else {
    el.textContent = "本日の日付：" + targetDateObj.toLocaleDateString('ja-JP', options);
  }

  // 天気取得
  if (typeof fetchWeather === "function") fetchWeather();

  // スコアボタン生成
  createScoreButtons();

  // 朝の記録との比較バナー表示
  showMorningCompareBanner();
};

function createScoreButtons() {
  Object.keys(SCORE_CONFIG).forEach(scoreId => {
    const config = SCORE_CONFIG[scoreId];
    const container = document.getElementById(scoreId);
    if (!container) return;
    container.innerHTML = "";

    config.items.forEach(item => {
      const btn = document.createElement("button");
      btn.className = `score-emoji-btn ${item.cls}`;
      btn.dataset.value = item.value;
      btn.type = "button";

      if (scoreId === "energy") {
        btn.appendChild(createBatteryIcon(item.battery));
      } else {
        const emojiSpan = document.createElement("span");
        emojiSpan.className = "score-emoji";
        emojiSpan.textContent = item.emoji;
        btn.appendChild(emojiSpan);

        const labelSpan = document.createElement("span");
        labelSpan.className = "score-label";
        labelSpan.textContent = item.label;
        btn.appendChild(labelSpan);
      }

      btn.onclick = () => {
        container.querySelectorAll(".score-emoji-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      };

      container.appendChild(btn);
    });
  });
}

function createBatteryIcon(percent) {
  const wrapper = document.createElement("div");
  wrapper.className = "battery-icon";

  const fill = document.createElement("div");
  fill.className = "battery-fill";
  fill.style.width = `calc(${percent}% - 2px)`;
  fill.style.background = BATTERY_COLORS[percent] || "#4CAF50";

  const text = document.createElement("span");
  text.className = "battery-text";
  text.textContent = percent + "%";

  wrapper.appendChild(fill);
  wrapper.appendChild(text);
  return wrapper;
}

function showMorningCompareBanner() {
  // ★★★ 修正点 ★★★
  // グローバル変数 pageTargetDate を使う
  const morningData = localStorage.getItem("morning_" + pageTargetDate);
  const banner = document.getElementById("morningCompareBanner");
  if (!banner) return;

  if (morningData) {
    try {
      const d = JSON.parse(morningData);
      const scoreEmoji = { 1:"🤧", 2:"😷", 3:"🙂", 4:"😊", 5:"😄" };
      const energyLabel = { 1:"20%", 2:"40%", 3:"60%", 4:"80%", 5:"100%" };
      const mentalEmoji = { 1:"⛈️", 2:"🌧️", 3:"☁️", 4:"🌤️", 5:"☀️" };

      banner.innerHTML = `
        <div style="font-size:12px;color:#555;margin-bottom:4px;">朝の記録</div>
        <div style="display:flex;gap:16px;font-size:14px;">
          <span>体調 ${scoreEmoji[d.condition] || "-"}</span>
          <span>活力 ${energyLabel[d.energy] || "-"}</span>
          <span>メンタル ${mentalEmoji[d.mental] || "-"}</span>
        </div>
      `;
      banner.style.display = "block";
    } catch(e) {}
  }
}

function sendEveningData() {
  // ★★★ 修正点 ★★★
  // グローバル変数 pageTargetDate を使う
  if (!pageTargetDate) {
    alert("エラー：記録対象の日付が不明です。ページを再読み込みしてください。");
    return;
  }

  const getScore = id => {
    const btn = document.querySelector(`#${id} .score-emoji-btn.active`);
    return btn ? parseInt(btn.dataset.value) : null;
  };

  const factors = typeof getSelectedFactors === "function" ? getSelectedFactors() : [];

  const wc = typeof weatherCache !== "undefined" ? weatherCache : {};

  const data = {
    date:            pageTargetDate,
    recordType:      "evening",
    attendance:      document.getElementById("attendance") ? document.getElementById("attendance").value : "",
    weather:         wc.weather || "",
    temp:            wc.temp || "",
    pressure:        wc.pressure || "",
    pressureWarning: wc.pressureWarning || "",
    condition:       getScore("condition"),
    energy:          getScore("energy"),
    mental:          getScore("mental"),
    factors:         factors,
    comment:         document.getElementById("comment").value
  };

  localStorage.setItem("evening_" + pageTargetDate, JSON.stringify(data));
  localStorage.setItem("evening_" + pageTargetDate + "_done", "1");

  const SEND_URL = APP_CONFIG.GAS_URL;

  if (SEND_URL) {
    const params = new URLSearchParams();
    Object.entries(data).forEach(([key, value]) => {
      params.append(key, Array.isArray(value) ? value.join(",") : (value ?? ""));
    });

    fetch(SEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: params.toString()
    })
    .then(res => res.json())
    .then(result => {
      console.log("GAS送信完了:", result);
    })
    .catch(e => console.warn("GAS送信エラー:", e));
  }

  const now = new Date();
  const actualToday = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

  if (pageTargetDate !== actualToday) {
    alert("✅ " + pageTargetDate + " の夜の振り返りを保存しました！");
  } else {
    alert("✅ 夜の振り返りを保存しました！");
  }
  window.location.href = "index.html";
}
</script>

</body>
</html>
