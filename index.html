<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セルフケアチェックイン</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

.section{
margin-top:20px;
}

.score-buttons{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:5px;
margin-top:8px;
}

.score-buttons button{
padding:10px;
border:none;
background:#e0e0e0;
border-radius:5px;
cursor:pointer;
}

.score-buttons button.active{
background:#4CAF50;
color:white;
}

textarea{
width:100%;
padding:8px;
margin-top:8px;
}

.submit{
width:100%;
padding:12px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.weather{
margin-top:10px;
font-size:14px;
color:#333;
}

</style>
</head>

<body>

<div class="container">

<h2>セルフケアチェックイン</h2>

<a href="settings.html">初期設定</a>

<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">

<p>郵便番号で天気取得</p>

<input id="zipcode" placeholder="例 1600022">

<button onclick="getWeather()">天気取得</button>

<div class="weather" id="weatherResult">
天気未取得
</div>

</div>

<div class="section">

  <p>Goodサイン</p>
  <div id="goodList"></div>

</div>

<div class="section">

  <p>Badサイン</p>
  <div id="badList"></div>
</div>

<div class="section">

<p>コメント</p>

<textarea id="comment"></textarea>

</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<script>

function loadGoodSigns(){

const savedGood = localStorage.getItem("goodSigns")

if(!savedGood) return

const goodSigns = JSON.parse(savedGood)

const container = document.getElementById("goodList")

container.innerHTML=""

goodSigns.forEach(sign=>{

const label = document.createElement("label")

const checkbox = document.createElement("input")

checkbox.type="checkbox"
checkbox.name="good"
checkbox.value=sign

label.appendChild(checkbox)
label.append(" "+sign)

container.appendChild(label)

container.appendChild(document.createElement("br"))

})

}

function loadBadSigns(){

const savedBad = localStorage.getItem("badSigns")

if(!savedBad) return

const badSigns = JSON.parse(savedBad)

const container = document.getElementById("badList")

container.innerHTML=""

badSigns.forEach(sign=>{

const label = document.createElement("label")

const checkbox = document.createElement("input")

checkbox.type="checkbox"
checkbox.name="bad"
checkbox.value=sign

label.appendChild(checkbox)
label.append(" "+sign)

container.appendChild(label)

container.appendChild(document.createElement("br"))

})

}

function createButtons(id){

const container=document.getElementById(id)

for(let i=1;i<=9;i++){

const btn=document.createElement("button")

btn.textContent=i

btn.onclick=()=>{

container.querySelectorAll("button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

container.appendChild(btn)

}

}

createButtons("condition")
createButtons("energy")
createButtons("mental")



async function getWeather(){

// 初期設定で保存した郵便番号を自動取得
const zipcode=localStorage.getItem("zipcode")


if(!zipcode){

alert("郵便番号を入力してください")

return

}

try{

const zipRes=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zipcode}`)

const zipData=await zipRes.json()

if(!zipData.results){

alert("郵便番号が見つかりません")

return

}

const city=zipData.results[0].address2

const apiKey="deddd1941a75455fe3e9c7206db41b10"

const url=`https://api.openweathermap.org/data/2.5/weather?q=${city},JP&appid=${apiKey}&units=metric&lang=ja`

const res=await fetch(url)

const data=await res.json()

const weather=data.weather[0].description
const temp=data.main.temp
const pressure=data.main.pressure

document.getElementById("weatherResult").innerText=
`${city} / ${weather} / 気温 ${temp}℃ / 気圧 ${pressure}hPa`

}catch(e){

alert("天気取得に失敗しました")

}

}



function sendData(){

const condition=document.querySelector("#condition .active")?.textContent || ""
const energy=document.querySelector("#energy .active")?.textContent || ""
const mental=document.querySelector("#mental .active")?.textContent || ""

const weather=document.getElementById("weatherResult").innerText

const comment=document.getElementById("comment").value

const good=[...document.querySelectorAll('input[name="good"]:checked')]
.map(el=>el.value)
.join(",")

const bad=[...document.querySelectorAll('input[name="bad"]:checked')]
.map(el=>el.value)
.join(",")

const form=document.createElement("form")

form.action="https://script.google.com/macros/s/AKfycbxGIYLe3G7Z74wWUVnzb1GGPOT-eVgaCJuIlbnoxbSyTtPI4cr_5z5RSH56XGpfXlzmIA/exec"
form.method="POST"

function addField(name,value){

const input=document.createElement("input")

input.type="hidden"
input.name=name
input.value=value

form.appendChild(input)

}

addField("condition",condition)
addField("energy",energy)
addField("mental",mental)
addField("weather",weather)
addField("good",good)
addField("bad",bad) 
addField("comment",comment)

document.body.appendChild(form)

form.submit()

alert("送信しました")

}

window.onload = function(){
  loadGoodSigns()
  loadBadSigns()
  getWeather()  // ← ページ読み込み時に自動実行
}


</script>

</body>
</html>
