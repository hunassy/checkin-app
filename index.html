<style>
.sleep-section {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}

.sleep-section h3 {
  margin-top: 0;
  color: #333;
  border-bottom: 2px solid #4CAF50;
  padding-bottom: 10px;
}

.sleep-item {
  margin: 15px 0;
}

.sleep-item label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
  color: #555;
}

.sleep-item input[type="time"],
.sleep-item input[type="number"] {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
  font-size: 14px;
}

.sleep-result {
  background: #e8f5e9;
  padding: 10px;
  border-radius: 4px;
  margin-top: 10px;
  font-weight: bold;
  color: #2e7d32;
}

.sleep-type-buttons {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 10px;
}

.sleep-type-btn {
  padding: 12px;
  background: #f0f0f0;
  border: 2px solid #ddd;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  font-size: 14px;
}

.sleep-type-btn:hover {
  background: #e8e8e8;
}

.sleep-type-btn.active {
  background: #4CAF50;
  color: white;
  border-color: #4CAF50;
}

.attendance-dropdown {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
  box-sizing: border-box;
}
</style>
</head>

<body>

<div class="container">

<h2>セルフケアチェックイン</h2>

<a href="settings.html">初期設定</a>

<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">

<p>天気情報</p>

<div class="weather loading" id="weatherResult">
天気を取得中...
</div>

</div>

<div class="sleep-section">

<h3>🌙 睡眠について</h3>

<div class="sleep-item">
<label>睡眠タイプ</label>
<div class="sleep-type-buttons" id="sleepType"></div>
</div>

<div class="sleep-item">
<label>就寝時刻</label>
<input type="time" id="bedtime" placeholder="23:00">
</div>

<div class="sleep-item">
<label>起床時刻</label>
<input type="time" id="wakeuptime" placeholder="07:00">
</div>

<div class="sleep-item">
<label>途中で起きた時間（分）</label>
<input type="number" id="wakeupDuration" placeholder="0" min="0" max="1440">
</div>

<div class="sleep-result" id="sleepResult">
総睡眠時間：計算中...
</div>

</div>

<div class="section">

<p>今日の状況</p>
<select class="attendance-dropdown" id="attendance">
<option value="">選択してください</option>
<option value="通所">通所</option>
<option value="在宅">在宅</option>
<option value="休み">休み</option>
</select>

</div>

<div class="section">

  <p>Goodサイン</p>
  <div id="goodList"></div>

</div>

<div class="section">

  <p>Badサイン</p>
  <div id="badList"></div>
</div>

<div class="section">

<p>コメント</p>

<textarea id="comment"></textarea>

</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/utils.js"></script>
<script src="js/main.js"></script>

</body>
</html>
