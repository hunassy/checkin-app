<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>コンディションノート</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/mobile.css">
<script src="js/defaults.js"></script>
</head>

<body>

<div class="container">

<!-- 1. 本日の日付 -->
<div class="date-section" id="dateSection">
本日の日付：読み込み中...
</div>

<!-- 2-5. 天気情報 -->
<div class="weather-section" id="weatherSection">
<div class="weather-item">
<div class="weather-item-label">天気</div>
<div class="weather-item-value" id="weatherValue">取得中...</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気温</div>
<div class="weather-item-value" id="tempValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧</div>
<div class="weather-item-value" id="pressureValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧注意度</div>
<div class="weather-item-value" id="pressureWarning">-</div>
</div>
</div>

<!-- 6-7. 通所/在宅・朝食 -->
<div class="attendance-breakfast">
<div>
<label>通所/在宅</label>
<select class="attendance-dropdown" id="attendance">
<option value="">選択してください</option>
<option value="通所">通所</option>
<option value="在宅">在宅</option>
<option value="休み">休み</option>
</select>
</div>
<div>
<label>朝食は食べましたか？</label>
<select class="breakfast-dropdown" id="breakfast">
<option value="">選択してください</option>
<option value="食べた">食べた</option>
<option value="食べていない">食べていない</option>
</select>
</div>
</div>

<!-- 8. 睡眠について -->
<div class="sleep-section">

<h3>🌙 睡眠について</h3>

<div class="sleep-item">
<label>睡眠タイプ</label>
<div class="sleep-type-buttons" id="sleepType"></div>
</div>

<div class="sleep-item">
<label>就寝時刻</label>
<div class="time-row">
<div class="time-col">
<span class="time-label">時間</span>
<select id="bedtimeHour"><option value="">選択</option></select>
</div>
<div class="time-col">
<span class="time-label">分</span>
<select id="bedtimeMinute">
<option value="">選択</option>
<option value="0">00分</option>
<option value="10">10分</option>
<option value="20">20分</option>
<option value="30">30分</option>
<option value="40">40分</option>
<option value="50">50分</option>
</select>
</div>
</div>
</div>

<div class="sleep-item">
<label>起床時刻</label>
<div class="time-row">
<div class="time-col">
<span class="time-label">時間</span>
<select id="wakeuptimeHour"><option value="">選択</option></select>
</div>
<div class="time-col">
<span class="time-label">分</span>
<select id="wakeuptimeMinute">
<option value="">選択</option>
<option value="0">00分</option>
<option value="10">10分</option>
<option value="20">20分</option>
<option value="30">30分</option>
<option value="40">40分</option>
<option value="50">50分</option>
</select>
</div>
</div>
</div>

<div class="sleep-item">
<label>途中で起きた時間（分）</label>
<input type="text" id="wakeupDuration" placeholder="0">
</div>

<div class="sleep-result" id="sleepResult">
総睡眠時間：計算中...
</div>

</div>

<!-- 9. 薬について -->
<div class="medicine-section">
<h3>💊 薬について</h3>
<div class="medicine-list" id="medicineList"></div>
</div>

<!-- 10. 体調・活力・メンタル（絵文字スコアボタン） -->
<div class="score-section">
  <div class="score-section-title">体調</div>
  <div class="score-emoji-buttons" id="condition"></div>
</div>

<div class="score-section">
  <div class="score-section-title">活力</div>
  <div class="score-emoji-buttons" id="energy"></div>
</div>

<div class="score-section">
  <div class="score-section-title">メンタル</div>
  <div class="score-emoji-buttons" id="mental"></div>
</div>

<!-- 11. Good/Badサイン -->
<div class="good-bad-section">
<p>Goodサイン</p>
<div id="goodList" class="main-grid"></div>
</div>

<div class="good-bad-section">
<p>Badサイン</p>
<div id="badList" class="main-grid"></div>
</div>

<!-- 12. コメント -->
<div class="section">
<p>コメント</p>
<textarea id="comment"></textarea>
</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<!-- ボトムナビゲーション -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">📝</span>
    <span class="nav-label">記録</span>
    <span class="nav-dot"></span>
  </a>
  <a href="analysis.html" class="nav-item">
    <span class="nav-icon">📈</span>
    <span class="nav-label">分析</span>
  </a>
  <a href="settings.html" class="nav-item">
    <span class="nav-icon">⚙️</span>
    <span class="nav-label">設定</span>
  </a>
</nav>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/utils.js"></script>
<script src="js/main.js"></script>

</body>
</html>
