<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>セルフケアチェックイン</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

h1{
text-align:center;
}

.section{
margin-top:20px;
}

.score-buttons{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:6px;
margin-top:8px;
}

.score-buttons button{
padding:10px;
border:none;
background:#e0e0e0;
border-radius:5px;
cursor:pointer;
}

.score-buttons button.active{
background:#4CAF50;
color:white;
}

textarea{
width:100%;
padding:8px;
margin-top:8px;
border-radius:5px;
border:1px solid #ccc;
}

.submit{
width:100%;
padding:12px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>セルフケアチェックイン</h1>

<div class="section">
<p>体調</p>
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
<p>活力</p>
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
<p>メンタル</p>
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">
<p>コメント</p>
<textarea rows="4"></textarea>
</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<script>

function createScoreButtons(id){

const container = document.getElementById(id)

for(let i=1;i<=9;i++){

const btn = document.createElement("button")
btn.textContent = i

btn.onclick = function(){

container.querySelectorAll("button").forEach(b=>{
b.classList.remove("active")
})

btn.classList.add("active")

}

container.appendChild(btn)

}

}

createScoreButtons("condition")
createScoreButtons("energy")
createScoreButtons("mental")

function sendData(){

const condition = document.querySelector("#condition .active")?.textContent
const energy = document.querySelector("#energy .active")?.textContent
const mental = document.querySelector("#mental .active")?.textContent
const comment = document.querySelector("textarea").value

const form = document.createElement("form")

form.action = "https://script.google.com/macros/s/AKfycbxGIYLe3G7Z74wWUVnzb1GGPOT-eVgaCJuIlbnoxbSyTtPI4cr_5z5RSH56XGpfXlzmIA/exec"
form.method = "POST"

function addField(name,value){
const input = document.createElement("input")
input.type="hidden"
input.name=name
input.value=value
form.appendChild(input)
}

addField("condition",condition)
addField("energy",energy)
addField("mental",mental)
addField("comment",comment)

document.body.appendChild(form)

form.submit()

}

</script>

</body>
</html>
