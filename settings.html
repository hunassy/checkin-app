<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<!-- スマホのブラウザで画面いっぱいに表示させるための設定 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>個人設定</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/mobile.css">
</head>

<body>

<div class="container">



<!-- 1. 郵便番号 -->
<h2>郵便番号</h2>
<div class="zipcode-section">
  <div class="zipcode-input-group">
    <input id="zipcode" placeholder="例 1600022" onchange="displayCity()">
  </div>
  <div class="zipcode-display" id="cityDisplay">市町村：未設定</div>
</div>

<!-- 8. 睡眠タイプ -->
<h2>睡眠タイプ</h2>
<p>睡眠タイプをカスタマイズできます</p>
<div class="sleep-type-editor" id="sleepTypeEditor"></div>

<!-- 9. 薬について -->
<h2>薬について</h2>
<div class="input-group">
  <input id="medicineInput" placeholder="例 イフェクサーSRカプセル75mg">
  <button onclick="addMedicine()">追加</button>
</div>
<div id="medicineList"></div>

<!-- 10. Good/Badサイン -->
<h2>Goodサイン</h2>
<p class="list-hint">最大10個まで登録できます</p>
<div class="input-group">
  <input id="goodInput" placeholder="例 よく眠れた">
  <button onclick="addGood()">追加</button>
</div>
<div class="scroll-list-wrapper">
  <div id="goodList"></div>
</div>

<h2>Badサイン</h2>
<p class="list-hint">最大10個まで登録できます</p>
<div class="input-group">
  <input id="badInput" placeholder="例 頭痛">
  <button onclick="addBad()">追加</button>
</div>
<div class="scroll-list-wrapper">
  <div id="badList"></div>
</div>

<button onclick="saveSettings()">設定保存</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/defaults.js" defer></script>
<script src="js/utils.js" defer></script>
<script src="js/settings.js" defer></script>

    <span class="nav-icon">⚙️</span>
    <span class="nav-label">設定</span>
    <span class="nav-dot"></span>
  </a>
</nav>

</body>
</html>
