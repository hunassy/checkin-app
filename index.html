<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セルフケアチェックイン</title>

<style>

body{
font-family:sans-serif;
background:#f0f0f0;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

.section{
margin-top:20px;
}

.score-buttons{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:5px;
margin-top:8px;
}

.score-buttons button{
padding:10px;
border:none;
background:#e0e0e0;
border-radius:5px;
cursor:pointer;
}

.score-buttons button.active{
background:#4CAF50;
color:white;
}

textarea{
width:100%;
padding:8px;
margin-top:8px;
}

.submit{
width:100%;
padding:12px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.weather{
margin-top:10px;
font-size:14px;
color:#333;
padding:10px;
background:#f9f9f9;
border-radius:5px;
}

.weather.loading{
color:#999;
}

.weather.error{
color:#d32f2f;
}

.weather.success{
color:#388e3c;
}

label{
display:block;
margin:8px 0;
}

input[type="checkbox"]{
margin-right:8px;
}

</style>

<body>

<div class="container">

<h2>セルフケアチェックイン</h2>

<a href="settings.html">初期設定</a>

<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">

<p>天気情報</p>

<div class="weather loading" id="weatherResult">
天気を取得中...
</div>

</div>

<div class="section">

  <p>Goodサイン</p>
  <div id="goodList"></div>

</div>

<div class="section">

  <p>Badサイン</p>
  <div id="badList"></div>
</div>

<div class="section">

<p>コメント</p>

<textarea id="comment"></textarea>

</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<script>

function loadGoodSigns(){

const savedGood = localStorage.getItem("goodSigns")

if(!savedGood) return

const goodSigns = JSON.parse(savedGood)

const container = document.getElementById("goodList")

container.innerHTML=""

goodSigns.forEach(sign=>{

const label = document.createElement("label")

const checkbox = document.createElement("input")

checkbox.type="checkbox"
checkbox.name="good"
checkbox.value=sign

label.appendChild(checkbox)
label.append(" "+sign)

container.appendChild(label)

})

}

function loadBadSigns(){

const savedBad = localStorage.getItem("badSigns")

if(!savedBad) return

const badSigns = JSON.parse(savedBad)

const container = document.getElementById("badList")

container.innerHTML=""

badSigns.forEach(sign=>{

const label = document.createElement("label")

const checkbox = document.createElement("input")

checkbox.type="checkbox"
checkbox.name="bad"
checkbox.value=sign

label.appendChild(checkbox)
label.append(" "+sign)

container.appendChild(label)

})

}

function createButtons(id){

const container=document.getElementById(id)

for(let i=1;i<=9;i++){

const btn=document.createElement("button")

btn.textContent=i

btn.onclick=()=>{

container.querySelectorAll("button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

container.appendChild(btn)

}

}

createButtons("condition")
createButtons("energy")
createButtons("mental")



async function getWeather(){

const zipcode=localStorage.getItem("zipcode")

if(!zipcode){

document.getElementById("weatherResult").innerText="郵便番号が設定されていません。初期設定から設定してください。"
document.getElementById("weatherResult").className="weather error"

return

}

try{

const weatherDiv=document.getElementById("weatherResult")
weatherDiv.className="weather loading"
weatherDiv.innerText="天気を取得中..."

const zipRes=await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zipcode}`)

const zipData=await zipRes.json()

if(!zipData.results){

weatherDiv.innerText="郵便番号が見つかりません"
weatherDiv.className="weather error"

return

}

const city=zipData.results[0].address2

const apiKey="deddd1941a75455fe3e9c7206db41b10"

const url=`https://api.openweathermap.org/data/2.5/weather?q=${city},JP&appid=${apiKey}&units=metric&lang=ja`

const res=await fetch(url)

const data=await res.json()

const weather=data.weather[0].description
const temp=data.main.temp
const pressure=data.main.pressure

const weatherText=`${city} / ${weather} / 気温 ${temp}℃ / 気圧 ${pressure}hPa`

document.getElementById("weatherResult").innerText=weatherText
document.getElementById("weatherResult").className="weather success"

// 天気情報をグローバル変数に保存（送信時に使用）
window.currentWeather=weatherText

}catch(e){

document.getElementById("weatherResult").innerText="天気取得に失敗しました"
document.getElementById("weatherResult").className="weather error"

}

}



function sendData(){

const condition=document.querySelector("#condition .active")?.textContent || ""
const energy=document.querySelector("#energy .active")?.textContent || ""
const mental=document.querySelector("#mental .active")?.textContent || ""

const weather=window.currentWeather || document.getElementById("weatherResult").innerText

const comment=document.getElementById("comment").value

const good=[...document.querySelectorAll('input[name="good"]:checked')]
.map(el=>el.value)
.join(",")

const bad=[...document.querySelectorAll('input[name="bad"]:checked')]
.map(el=>el.value)
.join(",")

const form=document.createElement("form")

form.action="https://script.google.com/macros/s/AKfycbxGIYLe3G7Z74wWUVnzb1GGPOT-eVgaCJuIlbnoxbSyTtPI4cr_5z5RSH56XGpfXlzmIA/exec"
form.method="POST"

function addField(name,value){

const input=document.createElement("input")

input.type="hidden"
input.name=name
input.value=value

form.appendChild(input)

}

addField("condition",condition)
addField("energy",energy)
addField("mental",mental)
addField("weather",weather)
addField("good",good)
addField("bad",bad)
addField("comment",comment)

document.body.appendChild(form)

form.submit()

alert("送信しました")

// 送信後、フォームをリセット
setTimeout(()=>{
  document.querySelector("#condition").querySelectorAll("button").forEach(b=>b.classList.remove("active"))
  document.querySelector("#energy").querySelectorAll("button").forEach(b=>b.classList.remove("active"))
  document.querySelector("#mental").querySelectorAll("button").forEach(b=>b.classList.remove("active"))
  document.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false)
  document.getElementById("comment").value=""
}, 1000)

}

window.onload = function(){

loadGoodSigns()
loadBadSigns()

// ページ読み込み時に自動で天気を取得
getWeather()

}

</script>

</body>
</html>
