<style>
.date-section {
  background: #e3f2fd;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  font-size: 16px;
  font-weight: bold;
  color: #1565c0;
}

.weather-section {
  background: #fff3e0;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.weather-item {
  background: white;
  padding: 10px;
  border-radius: 4px;
  border-left: 4px solid #ff9800;
  text-align: center;
}

.weather-item-label {
  font-size: 12px;
  color: #666;
  margin-bottom: 5px;
}

.weather-item-value {
  font-size: 18px;
  font-weight: bold;
  color: #333;
}

.sleep-section {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}

.sleep-section h3 {
  margin-top: 0;
  color: #333;
  border-bottom: 2px solid #4CAF50;
  padding-bottom: 10px;
}

.sleep-item {
  margin: 15px 0;
}

.sleep-item label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
  color: #555;
}

.sleep-item input[type="time"],
.sleep-item input[type="number"] {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
  font-size: 14px;
}

.sleep-result {
  background: #e8f5e9;
  padding: 10px;
  border-radius: 4px;
  margin-top: 10px;
  font-weight: bold;
  color: #2e7d32;
}

.sleep-type-buttons {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 10px;
}

.sleep-type-btn {
  padding: 12px;
  background: #f0f0f0;
  border: 2px solid #ddd;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  font-size: 14px;
}

.sleep-type-btn:hover {
  background: #e8e8e8;
}

.sleep-type-btn.active {
  background: #4CAF50;
  color: white;
  border-color: #4CAF50;
}

.attendance-dropdown,
.breakfast-dropdown {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
  box-sizing: border-box;
}

.medicine-section {
  background: #f3e5f5;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}

.medicine-section h3 {
  margin-top: 0;
  color: #333;
  border-bottom: 2px solid #9c27b0;
  padding-bottom: 10px;
}

.medicine-list {
  margin-top: 10px;
}

.medicine-item-label {
  display: block;
  margin: 8px 0;
}

.medicine-item-label input[type="checkbox"] {
  margin-right: 8px;
}
</style>
</head>

<body>

<div class="container">

<h2>セルフケアチェックイン</h2>

<a href="settings.html">初期設定</a>

<!-- 1. 本日の日付 -->
<div class="date-section" id="dateSection">
本日の日付：2026年3月11日
</div>

<!-- 2-5. 天気情報 -->
<div class="weather-section" id="weatherSection">
<div class="weather-item">
<div class="weather-item-label">天気</div>
<div class="weather-item-value" id="weatherValue">取得中...</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気温</div>
<div class="weather-item-value" id="tempValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧</div>
<div class="weather-item-value" id="pressureValue">-</div>
</div>
</div>

<!-- 5. 気圧注意度 -->
<div class="section">
<p>気圧注意度</p>
<div style="font-size: 18px; font-weight: bold; color: #ff9800;" id="pressureWarning">-</div>
</div>

<!-- 6. 通所/在宅 -->
<div class="section">
<p>通所/在宅</p>
<select class="attendance-dropdown" id="attendance">
<option value="">選択してください</option>
<option value="通所">通所</option>
<option value="在宅">在宅</option>
<option value="休み">休み</option>
</select>
</div>

<!-- 7. 朝食は食べましたか？ -->
<div class="section">
<p>朝食は食べましたか？</p>
<select class="breakfast-dropdown" id="breakfast">
<option value="">選択してください</option>
<option value="食べた">食べた</option>
<option value="食べていない">食べていない</option>
</select>
</div>

<!-- 8. 睡眠について -->
<div class="sleep-section">

<h3>🌙 睡眠について</h3>

<div class="sleep-item">
<label>睡眠タイプ</label>
<div class="sleep-type-buttons" id="sleepType"></div>
</div>

<div class="sleep-item">
<label>就寝時刻</label>
<input type="time" id="bedtime" placeholder="23:00">
</div>

<div class="sleep-item">
<label>起床時刻</label>
<input type="time" id="wakeuptime" placeholder="07:00">
</div>

<div class="sleep-item">
<label>途中で起きた時間（分）</label>
<input type="number" id="wakeupDuration" placeholder="0" min="0" max="1440">
</div>

<div class="sleep-result" id="sleepResult">
総睡眠時間：計算中...
</div>

</div>

<!-- 9. 薬について -->
<div class="medicine-section">

<h3>💊 薬について</h3>

<div class="medicine-list" id="medicineList"></div>

</div>

<!-- 10. 体調・活力・メンタル -->
<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<!-- 11. Good/Badサイン -->
<div class="section">

  <p>Goodサイン</p>
  <div id="goodList"></div>

</div>

<div class="section">

  <p>Badサイン</p>
  <div id="badList"></div>
</div>

<!-- 12. コメント -->
<div class="section">

<p>コメント</p>

<textarea id="comment"></textarea>

</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/utils.js"></script>
<script src="js/main.js"></script>

</body>
</html>
