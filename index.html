<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セルフケアチェックイン</title>

<style>
body{
font-family:sans-serif;
background:#f0f0f0;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

.section{
margin-top:20px;
}

.score-buttons{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:5px;
margin-top:8px;
}

.score-buttons button{
padding:10px;
border:none;
background:#e0e0e0;
border-radius:5px;
}

.score-buttons button.active{
background:#4CAF50;
color:white;
}

textarea{
width:100%;
padding:8px;
margin-top:8px;
}

.submit{
width:100%;
padding:12px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>セルフケアチェックイン</h2>

<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">
<p>住んでいる市町村</p>
<input id="city" placeholder="例 Tokyo">
<button onclick="getWeather()">天気取得</button>

<div id="weatherResult">天気未取得</div>
</div>

<div class="section">
<p>Goodサイン</p>

<label><input type="checkbox" name="good" value="よく眠れた"> よく眠れた</label><br>
<label><input type="checkbox" name="good" value="食欲がある"> 食欲がある</label><br>
<label><input type="checkbox" name="good" value="体が軽い"> 体が軽い</label>

</div>

<div class="section">
コメント
<textarea id="comment"></textarea>
</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<script>

function createButtons(id){

const container = document.getElementById(id)

for(let i=1;i<=9;i++){

const btn = document.createElement("button")

btn.textContent=i

btn.onclick=()=>{

container.querySelectorAll("button").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

}

container.appendChild(btn)

}

}

createButtons("condition")
createButtons("energy")
createButtons("mental")


async function getWeather(){

const city=document.getElementById("city").value

const apiKey="deddd1941a75455fe3e9c7​​206db41b10"

const url=`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=ja`

const res=await fetch(url)

const data=await res.json()

const weather=data.weather[0].description
const temp=data.main.temp
const pressure=data.main.pressure

document.getElementById("weatherResult").innerText=
`${weather} / 気温 ${temp}℃ / 気圧 ${pressure}`

}



function sendData(){

const condition=document.querySelector("#condition .active")?.textContent
const energy=document.querySelector("#energy .active")?.textContent
const mental=document.querySelector("#mental .active")?.textContent

const weather=document.getElementById("weatherResult").innerText

const comment=document.getElementById("comment").value

const good=[...document.querySelectorAll('input[name="good"]:checked')]
.map(el=>el.value)
.join(",")

const form=document.createElement("form")

form.action="GASのURL"
form.method="POST"

function addField(name,value){

const input=document.createElement("input")

input.type="hidden"

input.name=name

input.value=value

form.appendChild(input)

}

addField("condition",condition)
addField("energy",energy)
addField("mental",mental)
addField("weather",weather)
addField("good",good)
addField("comment",comment)

document.body.appendChild(form)

form.submit()

alert("送信しました")

}

</script>

</body>
</html>
