<style>
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  flex: 1;
}

.back-link {
  background: #4CAF50;
  color: white;
  padding: 8px 16px;
  border-radius: 4px;
  text-decoration: none;
  font-size: 14px;
}

.back-link:hover {
  background: #45a049;
  text-decoration: none;
}

.zipcode-section {
  margin-bottom: 20px;
}

.zipcode-input-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.zipcode-input-group input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
}

.zipcode-display {
  padding: 10px;
  background: #c8e6c9;
  border-radius: 4px;
  border-left: 4px solid #388e3c;
  font-weight: bold;
  color: #1b5e20;
  min-height: 20px;
}

.item-row {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 10px 0;
  padding: 10px;
  background: #f9f9f9;
  border-radius: 4px;
}

.item-text {
  flex: 1;
  word-break: break-all;
}

.item-buttons {
  display: flex;
  gap: 10px;
  white-space: nowrap;
}

.item-buttons button {
  margin: 0;
  padding: 6px 12px;
  font-size: 12px;
}

.sleep-type-editor {
  margin-top: 10px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 5px;
}

/* 1. 各行のレイアウト設定 */
.sleep-type-item {
  margin: 10px 0;
  display: flex;
  align-items: center; /* ← stretchからcenterに戻し、上下中央に揃えます */
  gap: 8px;
  height: 34px; /* ← 行全体の高さを固定します */
}

/* 2. 数字（1〜5）のラベル */
.sleep-type-label {
  width: 20px; /* 幅を少し狭くして数字をスッキリさせます */
  font-weight: bold;
  color: #666;
  display: flex;
  align-items: center;
  height: 100%; /* 親の高さに合わせます */
}

/* 3. プルダウン（記号）の設定 */
.sleep-type-symbol {
  width: 80px; /* 100pxから少し狭くしてバランスを調整 */
  height: 100%; /* 親の高さに合わせます */
}

.sleep-type-symbol select {
  width: 100%;
  height: 100%; /* 枠いっぱいの高さに */
  box-sizing: border-box;
  padding: 0 4px;
  border: 1px solid #ddd;
  border-radius: 4px;
  background: white;
  text-align: center;
  font-size: 18px;
  display: block; /* 余計な隙間を消すためにblockに */
}

/* 4. テキスト入力欄の設定 */
.sleep-type-input {
  flex: 1;
  height: 100%; /* 枠いっぱいの高さに */
  box-sizing: border-box;
  padding: 0 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
}

.sleep-type-symbol {
  width: 60px;
}

.sleep-type-symbol select {
  width: 100%;
  padding: 6px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 18px;
}

.symbol-double-circle {font-size: 26px;}
.symbol-circle {font-size: 25px;}
.symbol-triangle {font-size: 25px;}
.symbol-cross {font-size: 25px;}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>個人設定</h1>
  <a href="index.html" class="back-link">戻る</a>
</div>

<!-- 1. 郵便番号 -->
<h2>郵便番号</h2>
<div class="zipcode-section">
  <div class="zipcode-input-group">
    <input id="zipcode" placeholder="例 1600022" onchange="displayCity()">
  </div>
  <div class="zipcode-display" id="cityDisplay">市町村：未設定</div>
</div>

<!-- 8. 睡眠タイプ -->
<h2>睡眠タイプ</h2>
<p>睡眠タイプをカスタマイズできます</p>
<div class="sleep-type-editor" id="sleepTypeEditor"></div>

<!-- 9. 薬について -->
<h2>薬について</h2>
<input id="medicineInput" placeholder="例 イフェクサーSRカプセル75mg">
<button onclick="addMedicine()">追加</button>
<div id="medicineList"></div>

<!-- 10. Good/Badサイン -->
<h2>Goodサイン</h2>
<input id="goodInput" placeholder="例 よく眠れた">
<button onclick="addGood()">追加</button>
<div id="goodList"></div>

<h2>Badサイン</h2>
<input id="badInput" placeholder="例 頭痛">
<button onclick="addBad()">追加</button>
<div id="badList"></div>

<button onclick="saveSettings()">設定保存</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/utils.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
