<div class="container">

<!-- 1. 郵便番号 -->
<h2>郵便番号</h2>
<div class="zipcode-section">
  <div class="zipcode-input-group">
    <input id="zipcode" placeholder="例 1600022" onchange="displayCity()">
  </div>
  <div class="zipcode-display" id="cityDisplay">市町村：未設定</div>
</div>

<!-- 8. 睡眠タイプ -->
<h2>睡眠タイプ</h2>
<p>睡眠タイプをカスタマイズできます</p>
<div class="sleep-type-editor" id="sleepTypeEditor"></div>

<!-- 10. Good/Badサイン -->
<h2>Goodサイン</h2>
<p class="list-hint">最大10個まで登録できます</p>
<div class="input-group">
  <input id="goodInput" placeholder="例 よく眠れた">
  <button onclick="addGood()">追加</button>
</div>
<div class="scroll-list-wrapper">
  <div id="goodList"></div>
</div>

<h2>Badサイン</h2>
<p class="list-hint">最大10個まで登録できます</p>
<div class="input-group">
  <input id="badInput" placeholder="例 頭痛">
  <button onclick="addBad()">追加</button>
</div>
<div class="scroll-list-wrapper">
  <div id="badList"></div>
</div>

<button onclick="saveSettings()">設定保存</button>

</div>
