<style>
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.header h2 {
  margin: 0;
  flex: 1;
}

.settings-link {
  background: #4CAF50;
  color: white;
  padding: 8px 16px;
  border-radius: 4px;
  text-decoration: none;
  font-size: 14px;
}

.settings-link:hover {
  background: #45a049;
  text-decoration: none;
}

.date-section {
  background: #e3f2fd;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  font-size: 16px;
  font-weight: bold;
  color: #1565c0;
}

.weather-section {
  background: #fff3e0;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 10px;
}

.weather-item {
  background: white;
  padding: 10px;
  border-radius: 4px;
  border-left: 4px solid #ff9800;
  text-align: center;
}

.weather-item-label {
  font-size: 12px;
  color: #666;
  margin-bottom: 5px;
}

.weather-item-value {
  font-size: 18px;
  font-weight: bold;
  color: #333;
}

.section-label {
  font-weight: bold;
  font-size: 16px;
  margin-top: 20px;
  margin-bottom: 10px;
}

.attendance-breakfast {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 15px;
}

.attendance-breakfast select {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
  box-sizing: border-box;
}

.attendance-breakfast label {
  font-weight: bold;
  margin-bottom: 5px;
  display: block;
}

.sleep-section {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}

.sleep-section h3 {
  margin-top: 0;
  color: #333;
  border-bottom: 2px solid #4CAF50;
  padding-bottom: 10px;
}

.sleep-item {
  margin: 15px 0;
}

.sleep-item label {
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
  color: #555;
}

.sleep-item select,
.sleep-item input[type="text"] {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
  font-size: 14px;
}

.time-input-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.time-input-group select {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
  font-size: 14px;
}

.time-input-group label {
  margin-bottom: 5px;
  font-weight: bold;
  color: #555;
  font-size: 14px;
}

.sleep-result {
  background: #e8f5e9;
  padding: 10px;
  border-radius: 4px;
  margin-top: 10px;
  font-weight: bold;
  color: #2e7d32;
}

.sleep-type-buttons {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 10px;
}

.sleep-type-btn {
  padding: 12px;
  background: #f0f0f0;
  border: 2px solid #ddd;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  font-size: 14px;
  color: #000;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 15px;
}

.sleep-type-btn:hover {
  background: #e8e8e8;
}

.sleep-type-btn.active {
  background: #4CAF50;
  color: white;
  border-color: #4CAF50;
}

.sleep-type-symbol {
  font-size: 36px;
  font-weight: bold;
  min-width: 40px;
  text-align: center;
}

.symbol-double-circle {
  font-size: 36px;
}

.symbol-circle {
  font-size: 32px;
}

.symbol-triangle {
  font-size: 35px;
}

.symbol-cross {
  font-size: 38px;
}

.sleep-type-text {
  flex: 1;
}

.medicine-section {
  background: #f3e5f5;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
}

.medicine-section h3 {
  margin-top: 0;
  color: #333;
  border-bottom: 2px solid #9c27b0;
  padding-bottom: 10px;
}

.medicine-list {
  margin-top: 10px;
}

.medicine-item-label {
  display: block;
  margin: 8px 0;
}

.medicine-item-label input[type="checkbox"] {
  margin-right: 8px;
}

.score-section {
  margin-top: 15px;
}

.score-section-title {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 5px;
}

.score-labels {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 5px;
  margin-bottom: 8px;
  font-size: 11px;
  text-align: center;
  color: #999;
}

.score-labels span {
  padding: 4px 0;
}

.score-labels span:nth-child(1) {
  color: #d32f2f;
  font-weight: bold;
  grid-column: 1;
}

.score-labels span:nth-child(2) {
  color: #f57c00;
  font-weight: bold;
  grid-column: 5;
}

.score-labels span:nth-child(3) {
  color: #388e3c;
  font-weight: bold;
  grid-column: 9;
}

.score-buttons {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 5px;
  margin-top: 8px;
}

.score-buttons button {
  padding: 10px;
  border: none;
  background: #e0e0e0;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

.score-buttons button.active {
  background: #4CAF50;
  color: white;
}

.good-bad-section {
  margin-top: 15px;
}

.good-bad-section p {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 10px;
}

#goodList, #badList {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 15px;
}

.good-bad-item {
  display: flex;
  align-items: center;
  font-size: 12px;
  background: white;
  padding: 8px;
  border-radius: 4px;
  border: 1px solid #eee;
}

.good-bad-item input {
  margin-right: 5px;
}

.completed {
  background: #e8f5e9;
  border-radius: 4px;
  padding: 10px;
}

textarea {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  box-sizing: border-box;
}

.submit {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

.submit:hover {
  background: #45a049;
}

/* 数値入力のスピナーを非表示 */
input[type="text"]::-webkit-outer-spin-button,
input[type="text"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input[type="text"][type="number"] {
  -moz-appearance: textfield;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>セルフケアチェックイン</h2>
  <a href="settings.html" class="settings-link">個人設定</a>
</div>

<!-- 1. 本日の日付 -->
<div class="date-section" id="dateSection">
本日の日付：2026年3月11日
</div>

<!-- 2-5. 天気情報 -->
<div class="weather-section" id="weatherSection">
<div class="weather-item">
<div class="weather-item-label">天気</div>
<div class="weather-item-value" id="weatherValue">取得中...</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気温</div>
<div class="weather-item-value" id="tempValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧</div>
<div class="weather-item-value" id="pressureValue">-</div>
</div>
<div class="weather-item">
<div class="weather-item-label">気圧注意度</div>
<div class="weather-item-value" id="pressureWarning">-</div>
</div>
</div>

<!-- 6-7. 通所/在宅・朝食 -->
<div class="attendance-breakfast">
<div>
<label>通所/在宅</label>
<select class="attendance-dropdown" id="attendance">
<option value="">選択してください</option>
<option value="通所">通所</option>
<option value="在宅">在宅</option>
<option value="休み">休み</option>
</select>
</div>
<div>
<label>朝食は食べましたか？</label>
<select class="breakfast-dropdown" id="breakfast">
<option value="">選択してください</option>
<option value="食べた">食べた</option>
<option value="食べていない">食べていない</option>
</select>
</div>
</div>

<!-- 8. 睡眠について -->
<div class="sleep-section">

<h3>🌙 睡眠について</h3>

<div class="sleep-item">
<label>睡眠タイプ</label>
<div class="sleep-type-buttons" id="sleepType"></div>
</div>

<div class="sleep-item">
<label>就寝時刻</label>
<div class="time-input-group">
<div>
<label style="font-size: 12px;">時間</label>
<select id="bedtimeHour">
<option value="">選択</option>
</select>
</div>
<div>
<label style="font-size: 12px;">分</label>
<select id="bedtimeMinute">
<option value="">選択</option>
<option value="0">00分</option>
<option value="10">10分</option>
<option value="20">20分</option>
<option value="30">30分</option>
<option value="40">40分</option>
<option value="50">50分</option>
</select>
</div>
</div>
</div>

<div class="sleep-item">
<label>起床時刻</label>
<div class="time-input-group">
<div>
<label style="font-size: 12px;">時間</label>
<select id="wakeuptimeHour">
<option value="">選択</option>
</select>
</div>
<div>
<label style="font-size: 12px;">分</label>
<select id="wakeuptimeMinute">
<option value="">選択</option>
<option value="0">00分</option>
<option value="10">10分</option>
<option value="20">20分</option>
<option value="30">30分</option>
<option value="40">40分</option>
<option value="50">50分</option>
</select>
</div>
</div>
</div>

<div class="sleep-item">
<label>途中で起きた時間（分）</label>
<input type="text" id="wakeupDuration" placeholder="0">
</div>

<div class="sleep-result" id="sleepResult">
総睡眠時間：計算中...
</div>

</div>

<!-- 9. 薬について -->
<div class="medicine-section">

<h3>💊 薬について</h3>

<div class="medicine-list" id="medicineList"></div>

</div>

<!-- 10. 体調・活力・メンタル -->
<div class="score-section">
<div class="score-section-title">体調</div>
<div class="score-labels">
<span>悪い</span>
<span>普通</span>
<span>良い</span>
</div>
<div class="score-buttons" id="condition"></div>
</div>

<div class="score-section">
<div class="score-section-title">活力</div>
<div class="score-labels">
<span>悪い</span>
<span>普通</span>
<span>良い</span>
</div>
<div class="score-buttons" id="energy"></div>
</div>

<div class="score-section">
<div class="score-section-title">メンタル</div>
<div class="score-labels">
<span>悪い</span>
<span>普通</span>
<span>良い</span>
</div>
<div class="score-buttons" id="mental"></div>
</div>

<!-- 11. Good/Badサイン -->
<div class="good-bad-section">
<p>Goodサイン</p>
<div id="goodList"></div>
</div>

<div class="good-bad-section">
<p>Badサイン</p>
<div id="badList"></div>
</div>

<!-- 12. コメント -->
<div class="section">
<p>コメント</p>
<textarea id="comment"></textarea>
</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/utils.js"></script>
<script src="js/main.js"></script>

</body>
</html>
