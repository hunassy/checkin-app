<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>セルフケアチェックイン</title>

<style>
body{
font-family:sans-serif;
background:#f0f0f0;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:420px;
margin:auto;
}

h1{
text-align:center;
}

.section{
margin-top:20px;
}

.score-buttons{
display:grid;
grid-template-columns:repeat(9,1fr);
gap:5px;
margin-top:8px;
}

.score-buttons button{
padding:10px;
border:none;
background:#e0e0e0;
border-radius:5px;
}

.score-buttons button.active{
background:#4CAF50;
color:white;
}

textarea{
width:100%;
padding:8px;
margin-top:8px;
}

.submit{
width:100%;
padding:12px;
margin-top:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<h1>セルフケアチェックイン</h1>

<div class="section">
体調
<div class="score-buttons" id="condition"></div>
</div>

<div class="section">
活力
<div class="score-buttons" id="energy"></div>
</div>

<div class="section">
メンタル
<div class="score-buttons" id="mental"></div>
</div>

<div class="section">
<div class="section">

<p>Goodサイン</p>
<label><input type="checkbox"> よく眠れた</label><br>
<label><input type="checkbox"> 食欲がある</label><br>
<label><input type="checkbox"> 体が軽い</label><br>

</div>

<div class="section">

<p>注意サイン</p>
<label><input type="checkbox"> 眠気</label><br>
<label><input type="checkbox"> 食欲がない</label><br>
<label><input type="checkbox"> 頭痛</label><br>

</div>

<div class="section">
<p>天気</p>
<select>
<option>晴れ</option>
<option>曇り</option>
<option>雨</option>
<option>雪</option>
</select>
</div>

<div class="section">
<p>朝食</p>
<select>
<option>食べた</option>
<option>少し食べた</option>
<option>食べていない</option>
</select>
</div>

<div class="section">
<p>通所状況</p>
<select>
<option>通所</option>
<option>在宅</option>
<option>欠席</option>
</select>
</div>

コメント
<textarea rows="4"></textarea>
</div>

<button class="submit" onclick="sendData()">送信</button>

</div>

<script>

function sendData(){

const condition = document.querySelector("#condition .active")?.textContent
const energy = document.querySelector("#energy .active")?.textContent
const mental = document.querySelector("#mental .active")?.textContent
const comment = document.querySelector("textarea").value

const form = document.createElement("form")

form.action = "https://script.google.com/macros/s/AKfycbxGIYLe3G7Z74wWUVnzb1GGPOT-eVgaCJuIlbnoxbSyTtPI4cr_5z5RSH56XGpfXlzmIA/exec"
form.method = "POST"

function addField(name,value){
const input = document.createElement("input")
input.type="hidden"
input.name=name
input.value=value
form.appendChild(input)
}

addField("condition",condition)
addField("energy",energy)
addField("mental",mental)
addField("comment",comment)

document.body.appendChild(form)

form.submit()

alert("送信しました")

}

</script>

</body>
</html>
