<style>
.sleep-type-editor {
  margin-top: 10px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 5px;
}

.sleep-type-item {
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sleep-type-item input {
  flex: 1;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
}

.sleep-type-label {
  width: 30px;
  font-weight: bold;
  color: #666;
}
</style>

<body>

<div class="container">

<h1>初期設定</h1>

<h2>郵便番号</h2>
<input id="zipcode" placeholder="例 1600022">

<h2>Goodサイン</h2>
<input id="goodInput" placeholder="例 よく眠れた">
<button onclick="addGood()">追加</button>
<div id="goodList"></div>

<h2>Badサイン</h2>
<input id="badInput" placeholder="例 頭痛">
<button onclick="addBad()">追加</button>
<div id="badList"></div>

<h2>睡眠タイプ</h2>
<p>睡眠タイプをカスタマイズできます</p>
<div class="sleep-type-editor" id="sleepTypeEditor"></div>

<h2>薬について</h2>
<input id="medicineInput" placeholder="例 イフェクサーSRカプセル75mg">
<button onclick="addMedicine()">追加</button>
<div id="medicineList"></div>

<button onclick="saveSettings()">設定保存</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/settings.js"></script>

</body>
