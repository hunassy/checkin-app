<style>
.sleep-type-editor {
  margin-top: 10px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 5px;
}

.sleep-type-item {
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sleep-type-item input {
  flex: 1;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
}

.sleep-type-label {
  width: 30px;
  font-weight: bold;
  color: #666;
}

.medicine-editor {
  margin-top: 10px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 5px;
}

.medicine-item {
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.medicine-item input {
  flex: 1;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 4px;
}

.medicine-item button {
  padding: 8px 12px;
  background: #f44336;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.medicine-item button:hover {
  background: #da190b;
}

.add-medicine-btn {
  margin-top: 10px;
  padding: 10px 16px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.add-medicine-btn:hover {
  background: #45a049;
}
</style>
</head>

<body>

<div class="container">

<h1>初期設定</h1>

<h2>郵便番号</h2>
<input id="zipcode" placeholder="例 1600022">

<h2>Goodサイン</h2>
<input id="goodInput" placeholder="例 よく眠れた">
<button onclick="addGood()">追加</button>
<div id="goodList"></div>

<h2>Badサイン</h2>
<input id="badInput" placeholder="例 頭痛">
<button onclick="addBad()">追加</button>
<div id="badList"></div>

<h2>睡眠タイプ</h2>
<p>睡眠タイプをカスタマイズできます</p>
<div class="sleep-type-editor" id="sleepTypeEditor"></div>

<h2>薬について</h2>
<p>服用している薬を登録できます</p>
<div class="medicine-editor" id="medicineEditor"></div>
<button class="add-medicine-btn" onclick="addMedicineField()">薬を追加</button>

<button onclick="saveSettings()">設定保存</button>

</div>

<!-- 外部JavaScriptファイルの読み込み -->
<script src="js/settings.js"></script>

</body>
</html>
